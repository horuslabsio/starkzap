<!DOCTYPE html>
<html lang="en">
   <head>
      <title>Floppy Bird × Starknet | StarkZap SDK</title>
      <meta http-equiv="content-type" content="text/html; charset=utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />

      <link href="/css/reset.css" rel="stylesheet">
      <link href="/css/main.css" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
      <style>
         .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 10000; }
         .overlay.show { display: flex; }
         .popup {
            background-color: #4ec0ca; border: 4px solid #2c3e50; border-radius: 0; padding: 20px;
            width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; position: relative;
            box-shadow: 4px 4px 0 #2c3e50; font-family: 'Press Start 2P', cursive;
         }
         .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #2c3e50; }
         .popup-title { margin: 0; color: #2c3e50; font-size: 12px; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); }
         .close-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #2c3e50; padding: 4px 8px; line-height: 1; font-family: 'Press Start 2P', cursive; }
         .popup-content { display: flex; flex-direction: column; gap: 8px; font-size: 8px; color: #2c3e50; text-shadow: 1px 1px 0 rgba(0,0,0,0.1); }
         .save-me-title { margin: 0; color: #2c3e50; font-size: 10px; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); }
         .save-me-copy { margin: 0; line-height: 1.8; }
         .save-me-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
         .save-me-pay-btn, .save-me-cancel-btn {
            padding: 6px 8px; font-size: 8px; color: #fff; border: 2px solid #34495e; border-radius: 4px;
            cursor: pointer; font-family: 'Press Start 2P', cursive; text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
            transition: all 0.2s ease; box-shadow: 2px 2px 0 #34495e;
         }
         .save-me-pay-btn { background-color: #2c3e50; }
         .save-me-cancel-btn { background-color: #6b7280; }
         .save-me-pay-btn:hover, .save-me-cancel-btn:hover { transform: translate(1px, 1px); box-shadow: 1px 1px 0 #34495e; }
         .save-me-pay-btn:active, .save-me-cancel-btn:active { transform: translate(2px, 2px); box-shadow: none; }
         .save-me-pay-btn:disabled, .save-me-cancel-btn:disabled { opacity: 0.6; cursor: not-allowed; }
      </style>
   </head>
   <body>
      <div id="gamecontainer">
         <div id="gamescreen">
            <div id="sky" class="animated">
               <div id="flyarea">
                  <div id="ceiling" class="animated"></div>
                  <div id="player" class="bird animated"></div>
                  <div id="bigscore"></div>
                  <div id="revive-countdown"></div>
                  <div id="splash"></div>
                  <div id="scoreboard">
                     <div id="medal"></div>
                     <div id="currentscore"></div>
                     <div id="highscore"></div>
                     <div id="actions">
                       <div id="save-me"><img src="/assets/saveme.png" alt="save me"></div>
                       <div id="replay"><img src="/assets/replay.png" alt="replay"></div>
                      </div>
                      </div>
               </div>
            </div>
            <div id="land" class="animated"><div id="debug"></div></div>
         </div>
      </div>
      <div id="footer">
         <a href="https://www.dotgears.com/">original game/concept/art by dong nguyen</a>
         <a href="https://nebezb.com/">recreated by nebez briefkani,</a>
         <a href="https://github.com/nebez/floppybird/">view github project</a>
         This is a demo of Floppy Bird with StarkZap payment integration.
      </div>
      <div class="boundingbox" id="playerbox"></div>
      <div class="boundingbox" id="pipebox"></div>

      <!-- Save Me payment modal -->
      <div id="save-me-overlay" class="overlay">
         <div class="popup">
            <div class="popup-header">
               <h2 class="save-me-title">Revive for $0.10</h2>
               <button type="button" class="close-btn" id="save-me-popup-close" aria-label="Close">×</button>
            </div>
            <div class="popup-content">
               <p class="save-me-copy">Pay 0.10 USD to revive and continue this run.</p>
               <p id="save-me-status-line" class="save-me-copy">Ready to pay.</p>
               <div class="save-me-actions">
                  <button type="button" class="save-me-cancel-btn" id="save-me-cancel">Cancel</button>
                  <button type="button" class="save-me-pay-btn" id="save-me-pay">Pay $0.10</button>
               </div>
            </div>
         </div>
      </div>

      <script src="/js/jquery.min.js"></script>
      <script src="/js/jquery.transit.min.js"></script>
      <script src="/js/buzz.min.js"></script>
      <script src="/js/main.js"></script>
      <script type="module" src="/main.ts"></script>
   </body>
</html>
